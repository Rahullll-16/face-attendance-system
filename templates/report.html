<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reports – FaceAttend</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f; --surface: #111118; --surface2: #1a1a24; --border: #2a2a3a;
    --accent: #00e5a0; --accent2: #7c3aed; --warn: #f59e0b; --danger: #ef4444;
    --text: #e8e8f0; --muted: #6b6b80; --font: 'Syne', sans-serif; --mono: 'DM Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(245,158,11,.025) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(245,158,11,.025) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(10,10,15,.9); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border); padding: 0 2rem; height: 64px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo { font-size: 1.2rem; font-weight: 800; letter-spacing: -.02em; }
  .nav-logo span { color: var(--accent); }
  .nav-links { display: flex; gap: .5rem; align-items: center; }
  .nav-links a { color: var(--muted); text-decoration: none; font-size: .8rem; font-weight: 600; padding: .45rem .9rem; border-radius: 8px; transition: all .2s; letter-spacing: .04em; text-transform: uppercase; }
  .nav-links a:hover { color: var(--text); background: var(--surface2); }
  .nav-links a.active { color: var(--warn); }
  .logout-btn { color: var(--muted); background: none; border: 1px solid var(--border); padding: .4rem .75rem; border-radius: 8px; font-size: .75rem; cursor: pointer; font-family: var(--font); transition: all .2s; }
  .logout-btn:hover { color: var(--danger); border-color: var(--danger); }

  .page { position: relative; z-index: 1; padding: 64px 2rem 3rem; max-width: 1400px; margin: 0 auto; }

  .header { padding: 2.5rem 0 2rem; border-bottom: 1px solid var(--border); margin-bottom: 2rem; display: flex; align-items: flex-end; justify-content: space-between; }
  .badge { display: inline-flex; align-items: center; background: rgba(245,158,11,.1); border: 1px solid rgba(245,158,11,.2); color: var(--warn); font-size: .7rem; font-family: var(--mono); padding: .25rem .75rem; border-radius: 100px; margin-bottom: .75rem; text-transform: uppercase; letter-spacing: .1em; }
  h1 { font-size: clamp(1.75rem,3vw,2.5rem); font-weight: 800; letter-spacing: -.04em; }
  h1 em { color: var(--warn); font-style: normal; }

  .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; margin-bottom: 2rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
  .stat-val { font-size: 2.25rem; font-weight: 800; letter-spacing: -.04em; line-height: 1; margin-bottom: .3rem; }
  .stat-label { font-family: var(--mono); font-size: .65rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }

  .toolbar { display: flex; align-items: center; gap: .75rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .date-input { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: .65rem 1rem; border-radius: 9px; font-family: var(--mono); font-size: .85rem; outline: none; cursor: pointer; transition: all .2s; }
  .date-input:focus { border-color: var(--warn); }
  .search-input { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: .65rem 1rem; border-radius: 9px; font-family: var(--mono); font-size: .85rem; outline: none; flex: 1; min-width: 200px; transition: all .2s; }
  .search-input:focus { border-color: var(--warn); }
  .search-input::placeholder { color: var(--muted); }
  .btn { padding: .65rem 1.1rem; border-radius: 9px; border: none; font-family: var(--font); font-size: .85rem; font-weight: 700; cursor: pointer; transition: all .2s; letter-spacing: .02em; text-transform: uppercase; }
  .btn-warn { background: var(--warn); color: #000; }
  .btn-warn:hover { background: #fbbf24; }
  .btn-sec { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-sec:hover { background: var(--border); }
  .btn-exp { background: rgba(0,229,160,.1); color: var(--accent); border: 1px solid rgba(0,229,160,.3); }
  .btn-exp:hover { background: rgba(0,229,160,.2); }

  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--surface2); }
  th { padding: .875rem 1rem; text-align: left; font-family: var(--mono); font-size: .65rem; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; border-bottom: 1px solid var(--border); font-weight: 400; white-space: nowrap; }
  td { padding: .875rem 1rem; font-size: .875rem; border-bottom: 1px solid rgba(42,42,58,.5); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.015); }

  .name-cell { display: flex; align-items: center; gap: .65rem; }
  .av { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, var(--accent2), var(--accent)); display: flex; align-items: center; justify-content: center; font-size: .7rem; font-weight: 800; color: white; flex-shrink: 0; }
  .nm { font-weight: 600; }
  .mono-cell { font-family: var(--mono); font-size: .78rem; color: var(--muted); }
  .time-cell { font-family: var(--mono); font-size: .78rem; }
  .status-badge { display: inline-block; padding: .2rem .65rem; border-radius: 5px; font-family: var(--mono); font-size: .65rem; text-transform: uppercase; letter-spacing: .06em; background: rgba(0,229,160,.1); color: var(--accent); border: 1px solid rgba(0,229,160,.2); }
  .conf-cell { font-family: var(--mono); font-size: .75rem; }

  .empty-state { text-align: center; padding: 3rem 2rem; color: var(--muted); font-family: var(--mono); font-size: .875rem; }
  .pagination { display: flex; align-items: center; justify-content: space-between; padding: 1rem; border-top: 1px solid var(--border); }
  .page-info { font-family: var(--mono); font-size: .72rem; color: var(--muted); }
  .page-btns { display: flex; gap: .5rem; }
  .page-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: .35rem .7rem; border-radius: 6px; cursor: pointer; font-size: .78rem; transition: all .2s; }
  .page-btn:hover { border-color: var(--warn); color: var(--warn); }
  .page-btn:disabled { opacity: .3; cursor: not-allowed; }

  @media(max-width:768px) {
    .stats-row { grid-template-columns: repeat(2,1fr); }
    .toolbar { flex-direction: column; align-items: stretch; }
    td,th { padding: .65rem .75rem; }
  }
</style>
</head>
<body>
<nav>
  <div class="nav-logo">Face<span>Attend</span></div>
  <div class="nav-links">
    <a href="/">Mark</a>
    <a href="/register">Register</a>
    <a href="/report" class="active">Reports</a>
    <button class="logout-btn" onclick="location.href='/logout'">Logout</button>
  </div>
</nav>

<div class="page">
  <div class="header">
    <div>
      <div class="badge">📊 Analytics</div>
      <h1>Attendance <em>Reports</em></h1>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-val" id="sTotalRecords" style="color:var(--accent)">0</div><div class="stat-label">Total Records</div></div>
    <div class="stat-card"><div class="stat-val" id="sTodayCount" style="color:var(--warn)">0</div><div class="stat-label">Today Present</div></div>
    <div class="stat-card"><div class="stat-val" id="sUniqueNames" style="color:var(--accent2)">0</div><div class="stat-label">Unique People</div></div>
    <div class="stat-card"><div class="stat-val" id="sDaysActive" style="color:#06b6d4">0</div><div class="stat-label">Days Tracked</div></div>
  </div>

  <div class="toolbar">
    <input class="date-input" type="date" id="dateFilter" onchange="applyFilter()"/>
    <input class="search-input" type="text" id="searchInput" placeholder="Search by name, roll no, reg no..." oninput="applyFilter()"/>
    <button class="btn btn-sec" onclick="clearFilter()">✕ Clear</button>
    <button class="btn btn-exp" onclick="exportCSV()">⬇ Export CSV</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Roll No</th>
          <th>Reg No</th>
          <th>Date</th>
          <th>Time</th>
          <th>Confidence</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="8"><div class="empty-state">Loading...</div></td></tr>
      </tbody>
    </table>
    <div class="pagination">
      <div class="page-info" id="pageInfo">Showing 0 records</div>
      <div class="page-btns">
        <button class="page-btn" id="prevBtn" onclick="changePage(-1)" disabled>← Prev</button>
        <button class="page-btn" id="nextBtn" onclick="changePage(1)" disabled>Next →</button>
      </div>
    </div>
  </div>
</div>

<script>
let allRecords = [], filtered = [], currentPage = 1;
const perPage = 25;

async function loadAll() {
  try {
    const res = await fetch('/api/attendance');
    const data = await res.json();
    allRecords = data.records || [];
    updateStats();
    applyFilter();
  } catch(e) {
    document.getElementById('tableBody').innerHTML = `<tr><td colspan="8"><div class="empty-state">Cannot connect to server.</div></td></tr>`;
  }
}

function updateStats() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('sTotalRecords').textContent = allRecords.length;
  document.getElementById('sTodayCount').textContent = allRecords.filter(r => r.date === today).length;
  document.getElementById('sUniqueNames').textContent = new Set(allRecords.map(r => r.name)).size;
  document.getElementById('sDaysActive').textContent = new Set(allRecords.map(r => r.date)).size;
}

function applyFilter() {
  const date = document.getElementById('dateFilter').value;
  const search = document.getElementById('searchInput').value.toLowerCase();
  filtered = allRecords.filter(r => {
    const mDate = !date || r.date === date;
    const mSearch = !search || r.name.toLowerCase().includes(search) || (r.roll_no||'').toLowerCase().includes(search) || (r.reg_no||'').toLowerCase().includes(search);
    return mDate && mSearch;
  });
  currentPage = 1; renderTable();
}

function clearFilter() {
  document.getElementById('dateFilter').value = '';
  document.getElementById('searchInput').value = '';
  filtered = [...allRecords]; currentPage = 1; renderTable();
}

function renderTable() {
  const start = (currentPage-1)*perPage, end = start+perPage;
  const page = filtered.slice(start, end);
  const totalPages = Math.ceil(filtered.length/perPage);
  document.getElementById('pageInfo').textContent = `Showing ${filtered.length>0?start+1:0}–${Math.min(end,filtered.length)} of ${filtered.length}`;
  document.getElementById('prevBtn').disabled = currentPage<=1;
  document.getElementById('nextBtn').disabled = currentPage>=totalPages;

  if (!page.length) {
    document.getElementById('tableBody').innerHTML = `<tr><td colspan="8"><div class="empty-state">No records found</div></td></tr>`;
    return;
  }

  document.getElementById('tableBody').innerHTML = page.map((r,i) => {
    const conf = r.confidence ? Math.round(r.confidence) : '-';
    const confColor = r.confidence >= 80 ? 'var(--accent)' : r.confidence >= 60 ? 'var(--warn)' : 'var(--muted)';
    return `<tr>
      <td class="mono-cell">${start+i+1}</td>
      <td><div class="name-cell"><div class="av">${r.name.charAt(0).toUpperCase()}</div><div class="nm">${r.name}</div></div></td>
      <td class="mono-cell">${r.roll_no || '—'}</td>
      <td class="mono-cell">${r.reg_no || '—'}</td>
      <td class="mono-cell">${r.date}</td>
      <td class="time-cell">${r.time}</td>
      <td class="conf-cell" style="color:${confColor}">${conf}%</td>
      <td><span class="status-badge">${r.status}</span></td>
    </tr>`;
  }).join('');
}

function changePage(d) { currentPage += d; renderTable(); window.scrollTo({top:0,behavior:'smooth'}); }

function exportCSV() {
  if (!filtered.length) { alert('No records to export.'); return; }
  const rows = [['Name','Roll No','Reg No','Date','Time','Confidence','Status'], ...filtered.map(r=>[r.name, r.roll_no||'', r.reg_no||'', r.date, r.time, r.confidence||'', r.status])];
  const blob = new Blob([rows.map(r=>r.join(',')).join('\n')], {type:'text/csv'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `attendance_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
}

document.getElementById('dateFilter').value = new Date().toISOString().split('T')[0];
loadAll();
</script>
</body>
</html>
