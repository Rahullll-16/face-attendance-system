<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login – FaceAttend</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#0a0a0f; --surface:#111118; --surface2:#1a1a24; --border:#2a2a3a;
    --accent:#00e5a0; --accent2:#7c3aed; --danger:#ef4444;
    --text:#e8e8f0; --muted:#6b6b80;
    --font:'Syne',sans-serif; --mono:'DM Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--bg); color:var(--text); font-family:var(--font);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  /* Animated background */
  .bg-anim{
    position:fixed; inset:0; z-index:0;
    background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(124,58,237,0.15), transparent),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(0,229,160,0.08), transparent);
  }
  .grid{
    position:fixed; inset:0; z-index:0;
    background-image: linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),
                      linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
    background-size:48px 48px;
  }
  .floating-shapes{position:fixed;inset:0;z-index:0;overflow:hidden;}
  .shape{
    position:absolute; border-radius:50%;
    animation: float 8s ease-in-out infinite;
    filter:blur(60px); opacity:0.15;
  }
  .shape-1{width:400px;height:400px;background:var(--accent2);top:-100px;left:-100px;animation-delay:0s;}
  .shape-2{width:300px;height:300px;background:var(--accent);bottom:-50px;right:-50px;animation-delay:-4s;}
  @keyframes float{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(30px,-20px) scale(1.05);}}

  .card{
    position:relative; z-index:1;
    background:rgba(17,17,24,0.8);
    backdrop-filter:blur(24px);
    border:1px solid var(--border);
    border-radius:24px;
    padding:3rem;
    width:100%; max-width:420px;
    box-shadow: 0 32px 64px rgba(0,0,0,0.5);
    animation: cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(0.95);}to{opacity:1;transform:none;}}

  .logo{
    text-align:center; margin-bottom:2rem;
  }
  .logo-icon{
    width:64px;height:64px;background:linear-gradient(135deg,var(--accent2),var(--accent));
    border-radius:16px;display:inline-flex;align-items:center;justify-content:center;
    font-size:1.75rem;margin-bottom:1rem;
    box-shadow: 0 8px 32px rgba(0,229,160,0.2);
  }
  .logo h1{font-size:1.75rem;font-weight:800;letter-spacing:-0.03em;}
  .logo h1 span{color:var(--accent);}
  .logo p{color:var(--muted);font-family:var(--mono);font-size:0.78rem;margin-top:0.25rem;letter-spacing:0.05em;}

  .form-group{margin-bottom:1.25rem;}
  .form-label{
    display:block;font-family:var(--mono);font-size:0.7rem;color:var(--muted);
    text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.5rem;
  }
  .input-wrap{position:relative;}
  .form-input{
    width:100%;background:var(--surface2);border:1px solid var(--border);
    color:var(--text);padding:0.875rem 1rem 0.875rem 2.75rem;
    border-radius:12px;font-family:var(--font);font-size:0.95rem;
    outline:none;transition:all 0.2s;
  }
  .form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,160,0.12);}
  .input-icon{
    position:absolute;left:1rem;top:50%;transform:translateY(-50%);
    color:var(--muted);font-size:0.9rem;pointer-events:none;
  }
  .input-toggle{
    position:absolute;right:1rem;top:50%;transform:translateY(-50%);
    background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.85rem;
    transition:color 0.2s;
  }
  .input-toggle:hover{color:var(--text);}

  .btn-login{
    width:100%;padding:1rem;background:linear-gradient(135deg,var(--accent2),#5b21b6);
    color:white;border:none;border-radius:12px;
    font-family:var(--font);font-size:1rem;font-weight:700;
    cursor:pointer;transition:all 0.2s;letter-spacing:0.02em;
    margin-top:0.5rem; text-transform:uppercase;
    box-shadow:0 4px 20px rgba(124,58,237,0.3);
  }
  .btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(124,58,237,0.4);}
  .btn-login:active{transform:none;}
  .btn-login:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

  .error-msg{
    background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);
    color:var(--danger);padding:0.75rem 1rem;border-radius:10px;
    font-size:0.875rem;font-weight:600;text-align:center;margin-bottom:1rem;display:none;
  }

  .footer-note{
    text-align:center;margin-top:1.5rem;
    font-family:var(--mono);font-size:0.72rem;color:var(--muted);
  }
  .footer-note span{color:var(--accent);}

  .loading-dots span{animation:blink 1.4s infinite both;}
  .loading-dots span:nth-child(2){animation-delay:0.2s;}
  .loading-dots span:nth-child(3){animation-delay:0.4s;}
  @keyframes blink{0%,80%,100%{opacity:0;}40%{opacity:1;}}
</style>
</head>
<body>
<div class="bg-anim"></div>
<div class="grid"></div>
<div class="floating-shapes">
  <div class="shape shape-1"></div>
  <div class="shape shape-2"></div>
</div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🎭</div>
    <h1>Face<span>Attend</span></h1>
    <p>// admin portal · secure access</p>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="form-group">
    <label class="form-label">Username</label>
    <div class="input-wrap">
      <span class="input-icon">👤</span>
      <input class="form-input" type="text" id="username" placeholder="Enter username" autocomplete="username"/>
    </div>
  </div>

  <div class="form-group">
    <label class="form-label">Password</label>
    <div class="input-wrap">
      <span class="input-icon">🔒</span>
      <input class="form-input" type="password" id="password" placeholder="Enter password" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')doLogin()"/>
      <button class="input-toggle" onclick="togglePwd()" id="toggleBtn">👁</button>
    </div>
  </div>
  
  <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In</button>

  <hr style="margin:20px 0; opacity:0.2;">

<h3 style="text-align:center; margin-bottom:10px;">Student Login</h3>

<div class="form-group">
  <label class="form-label">Name</label>
  <div class="input-wrap">
    <input class="form-input" type="text" id="s_name" placeholder="Enter name"/>
  </div>
</div>

<div class="form-group">
  <label class="form-label">Roll No</label>
  <div class="input-wrap">
    <input class="form-input" type="text" id="s_roll" placeholder="Enter roll no"/>
  </div>
</div>

<div class="form-group">
  <label class="form-label">Reg No</label>
  <div class="input-wrap">
    <input class="form-input" type="text" id="s_reg" placeholder="Enter reg no"/>
  </div>
</div>

<button class="btn-login" onclick="studentLogin()">View My Attendance</button>

  <div class="footer-note">
    Default: <span>admin</span> / <span>admin123</span><br/>
    Change password after first login
  </div>
</div>

<script>
function togglePwd(){
  const inp=document.getElementById('password');
  inp.type=inp.type==='password'?'text':'password';
}
async function studentLogin(){
  const name = document.getElementById('s_name').value.trim();
  const roll_no = document.getElementById('s_roll').value.trim();
  const reg_no = document.getElementById('s_reg').value.trim();

  if(!name || !roll_no || !reg_no){
    alert("Please fill all fields");
    return;
  }

  const res = await fetch('/student_login', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ name, roll_no, reg_no })
  });

  const data = await res.json();

  if(data.success){
    window.location.href = "/report";
  } else {
    alert("Invalid student details");
  }
}
async function doLogin(){
  const username=document.getElementById('username').value.trim();
  const password=document.getElementById('password').value;
  const btn=document.getElementById('loginBtn');
  const err=document.getElementById('errorMsg');
  err.style.display='none';
  if(!username||!password){err.textContent='Please enter username and password.';err.style.display='block';return;}
  btn.disabled=true;
  btn.innerHTML='<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span>';
  try{
    const res=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    const data=await res.json();
    if(data.success){window.location.href='/';}
    else{err.textContent=data.message||'Login failed.';err.style.display='block';}
  }catch(e){err.textContent='Server error. Is backend running?';err.style.display='block';}
  btn.disabled=false;btn.textContent='Sign In';
}
</script>
</body>
</html>
