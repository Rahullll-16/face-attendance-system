<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register – FaceAttend</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root{
    --bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;
    --accent:#00e5a0;--accent2:#7c3aed;--danger:#ef4444;--warn:#f59e0b;
    --text:#e8e8f0;--muted:#6b6b80;--font:'Syne',sans-serif;--mono:'DM Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
  body::before{
    content:'';position:fixed;inset:0;
    background-image:linear-gradient(rgba(124,58,237,.03) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(124,58,237,.03) 1px,transparent 1px);
    background-size:40px 40px;pointer-events:none;z-index:0;
  }
  nav{
    position:fixed;top:0;left:0;right:0;z-index:100;
    background:rgba(10,10,15,.9);backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);padding:0 2rem;height:64px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .nav-logo{font-size:1.2rem;font-weight:800;letter-spacing:-.02em;}
  .nav-logo span{color:var(--accent);}
  .nav-links{display:flex;gap:.4rem;align-items:center;}
  .nav-links a{
    color:var(--muted);text-decoration:none;font-size:.8rem;font-weight:600;
    padding:.45rem .9rem;border-radius:8px;transition:all .2s;
    letter-spacing:.04em;text-transform:uppercase;
  }
  .nav-links a.active{color:var(--accent2);}
  .nav-links a:hover{color:var(--text);background:var(--surface2);}
  .nav-logout{
    background:rgba(239,68,68,.1);color:var(--danger);border:1px solid rgba(239,68,68,.2);
    padding:.4rem .9rem;border-radius:8px;font-size:.8rem;font-weight:600;
    cursor:pointer;text-decoration:none;transition:all .2s;
  }
  .nav-logout:hover{background:rgba(239,68,68,.2);}

  .layout{
    position:relative;z-index:1;padding-top:64px;min-height:100vh;
    display:grid;grid-template-columns:1fr 420px;grid-template-rows:auto 1fr;
    max-width:1400px;margin:0 auto;
  }
  .header{
    grid-column:1/-1;padding:2.5rem 2rem 1.5rem;border-bottom:1px solid var(--border);
  }
  .badge{
    display:inline-flex;align-items:center;gap:.4rem;
    background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.2);
    color:var(--accent2);font-size:.72rem;font-family:var(--mono);
    padding:.28rem .8rem;border-radius:100px;margin-bottom:.75rem;
    letter-spacing:.1em;text-transform:uppercase;
  }
  h1{font-size:clamp(1.75rem,3vw,2.5rem);font-weight:800;letter-spacing:-.04em;line-height:1.1;margin-bottom:.4rem;}
  h1 em{color:var(--accent2);font-style:normal;}
  .subtitle{color:var(--muted);font-family:var(--mono);font-size:.82rem;}

  .cam-section{padding:2rem;border-right:1px solid var(--border);}
  .cam-wrap{
    position:relative;background:var(--surface);border:1px solid var(--border);
    border-radius:16px;overflow:hidden;aspect-ratio:4/3;max-height:420px;
  }
  #videoFeed{width:100%;height:100%;object-fit:cover;display:block;}
  .corner{position:absolute;width:22px;height:22px;border-color:var(--accent2);border-style:solid;border-width:0;opacity:.7;}
  .corner.tl{top:14px;left:14px;border-top-width:2px;border-left-width:2px;border-radius:4px 0 0 0;}
  .corner.tr{top:14px;right:14px;border-top-width:2px;border-right-width:2px;border-radius:0 4px 0 0;}
  .corner.bl{bottom:14px;left:14px;border-bottom-width:2px;border-left-width:2px;border-radius:0 0 0 4px;}
  .corner.br{bottom:14px;right:14px;border-bottom-width:2px;border-right-width:2px;border-radius:0 0 4px 0;}
  .cam-ph{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:.75rem;}
  canvas{display:none;}

  .controls{margin-top:1.25rem;display:flex;gap:.75rem;}
  .btn{
    flex:1;padding:.8rem 1.25rem;border-radius:10px;border:none;
    font-family:var(--font);font-size:.875rem;font-weight:700;cursor:pointer;
    transition:all .2s;letter-spacing:.02em;text-transform:uppercase;
  }
  .btn-primary{background:var(--accent2);color:white;}
  .btn-primary:hover{background:#8b5cf6;transform:translateY(-1px);}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
  .btn-secondary:hover{background:var(--border);}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}

  .sidebar{padding:2rem;display:flex;flex-direction:column;gap:1.25rem;overflow-y:auto;}

  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}
  .form-full{grid-column:1/-1;}
  .form-group{display:flex;flex-direction:column;gap:.4rem;}
  .form-label{font-family:var(--mono);font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}
  .form-label .req{color:var(--danger);}
  .form-input{
    background:var(--surface2);border:1px solid var(--border);color:var(--text);
    padding:.75rem 1rem;border-radius:10px;font-family:var(--font);font-size:.9rem;
    outline:none;transition:all .2s;width:100%;
  }
  .form-input:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(124,58,237,.12);}
  .form-input::placeholder{color:var(--muted);font-weight:400;}

  .preview-box{
    background:var(--surface2);border:2px dashed var(--border);
    border-radius:12px;height:140px;display:flex;align-items:center;justify-content:center;
    overflow:hidden;position:relative;
  }
  .preview-box img{width:100%;height:100%;object-fit:cover;border-radius:10px;display:none;}
  .prev-ph{text-align:center;color:var(--muted);font-family:var(--mono);font-size:.75rem;}

  .status-msg{
    padding:.875rem;border-radius:10px;font-size:.85rem;font-weight:600;text-align:center;display:none;
  }
  .status-msg.ok{background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.3);color:var(--accent);display:block;}
  .status-msg.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--danger);display:block;}

  /* User table */
  .sec-title{font-family:var(--mono);font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.6rem;}
  .user-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  table{width:100%;border-collapse:collapse;}
  thead{background:var(--surface2);}
  th{padding:.6rem .875rem;text-align:left;font-family:var(--mono);font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border);font-weight:400;}
  td{padding:.65rem .875rem;font-size:.8rem;border-bottom:1px solid rgba(42,42,58,.5);}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,.02);}
  .av{
    width:28px;height:28px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent2),var(--accent));
    display:inline-flex;align-items:center;justify-content:center;
    font-size:.7rem;font-weight:700;color:white;vertical-align:middle;margin-right:.5rem;
  }
  .del-btn{
    background:none;border:none;color:var(--muted);cursor:pointer;
    font-size:.78rem;transition:color .2s;padding:.2rem .4rem;
  }
  .del-btn:hover{color:var(--danger);}
  .empty-state{text-align:center;padding:1.5rem;color:var(--muted);font-family:var(--mono);font-size:.78rem;}

  .toast{
    position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);
    background:var(--surface2);border:1px solid var(--border);
    padding:.8rem 1.5rem;border-radius:12px;font-size:.875rem;font-weight:600;
    transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:999;
  }
  .toast.show{transform:translateX(-50%) translateY(0);}
  .toast.ok{border-color:rgba(0,229,160,.5);color:var(--accent);}
  .toast.err{border-color:rgba(239,68,68,.5);color:var(--danger);}

  @media(max-width:900px){
    .layout{grid-template-columns:1fr;}
    .cam-section{border-right:none;border-bottom:1px solid var(--border);}
    .form-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">Face<span>Attend</span></div>
  <div class="nav-links">
    <a href="/">Attendance</a>
    <a href="/register" class="active">Register</a>
    <a href="/report">Reports</a>
    <a href="/logout" class="nav-logout">Logout</a>
  </div>
</nav>

<div class="layout">
  <div class="header">
    <div class="badge">👤 Face Enrollment</div>
    <h1>Register <em>New Student</em></h1>
    <p class="subtitle">// capture face · enter details · save to system</p>
  </div>

  <div class="cam-section">
    <div class="cam-wrap">
      <div class="cam-ph" id="camPh">
        <div style="font-size:2.5rem;opacity:.3;">🎭</div>
        <p style="font-family:var(--mono);font-size:.82rem;">Start camera to capture face</p>
      </div>
      <video id="videoFeed" autoplay playsinline style="display:none;"></video>
      <canvas id="canvas"></canvas>
      <div style="position:absolute;inset:0;pointer-events:none;">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
      </div>
    </div>
    <div class="controls">
      <button class="btn btn-secondary" id="startBtn" onclick="startCamera()">▶ Start Camera</button>
      <button class="btn btn-primary" id="captureBtn" onclick="capturePhoto()" disabled>📸 Capture Photo</button>
    </div>
  </div>

  <div class="sidebar">
    <!-- Preview -->
    <div>
      <div class="sec-title">Captured Photo</div>
      <div class="preview-box" id="prevBox">
        <img id="prevImg" alt="face"/>
        <div class="prev-ph" id="prevPh"><div style="font-size:1.75rem;margin-bottom:.4rem;">👁</div>Capture photo first</div>
      </div>
    </div>

    <!-- Form -->
    <div class="form-grid">
      <div class="form-group form-full">
        <label class="form-label">Full Name <span class="req">*</span></label>
        <input class="form-input" type="text" id="fname" placeholder="e.g. Arjun Sharma"/>
      </div>
      <div class="form-group">
        <label class="form-label">Roll No <span class="req">*</span></label>
        <input class="form-input" type="text" id="froll" placeholder="e.g. CS-101"/>
      </div>
      <div class="form-group">
        <label class="form-label">Reg / Enroll No <span class="req">*</span></label>
        <input class="form-input" type="text" id="freg" placeholder="e.g. 2024CSE001"/>
      </div>
      <div class="form-group form-full">
        <label class="form-label">Email (optional – for notifications)</label>
        <input class="form-input" type="email" id="femail" placeholder="student@email.com"/>
      </div>
    </div>

    <div class="status-msg" id="statusMsg"></div>

    <button class="btn btn-primary" id="regBtn" onclick="registerFace()" disabled style="padding:.9rem;">
      ✅ Register Student
    </button>

    <!-- Registered users -->
    <div>
      <div class="sec-title">Registered Students (<span id="userCount">0</span>)</div>
      <div class="user-table-wrap">
        <table>
          <thead>
            <tr><th>Name</th><th>Roll No</th><th>Reg No</th><th></th></tr>
          </thead>
          <tbody id="userTbody">
            <tr><td colspan="4"><div class="empty-state">No students registered</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let camStream=null, capturedImage=null;

async function startCamera(){
  try{
    camStream=await navigator.mediaDevices.getUserMedia({video:{width:1280,height:720}});
    document.getElementById('videoFeed').srcObject=camStream;
    document.getElementById('videoFeed').style.display='block';
    document.getElementById('camPh').style.display='none';
    document.getElementById('startBtn').textContent='■ Stop';
    document.getElementById('startBtn').onclick=stopCamera;
    document.getElementById('captureBtn').disabled=false;
  }catch(e){ showToast('Camera access denied','err'); }
}

function stopCamera(){
  if(camStream){ camStream.getTracks().forEach(t=>t.stop()); camStream=null; }
  document.getElementById('videoFeed').style.display='none';
  document.getElementById('camPh').style.display='flex';
  document.getElementById('startBtn').textContent='▶ Start Camera';
  document.getElementById('startBtn').onclick=startCamera;
  document.getElementById('captureBtn').disabled=true;
}

function capturePhoto(){
  const v=document.getElementById('videoFeed');
  const c=document.getElementById('canvas');
  c.width=v.videoWidth; c.height=v.videoHeight;
  c.getContext('2d').drawImage(v,0,0);
  capturedImage=c.toDataURL('image/jpeg',.95);
  const img=document.getElementById('prevImg');
  img.src=capturedImage; img.style.display='block';
  document.getElementById('prevPh').style.display='none';
  document.getElementById('regBtn').disabled=false;
  document.getElementById('statusMsg').className='status-msg';
  showToast('📸 Photo captured!','ok');
}

async function registerFace(){
  const name=document.getElementById('fname').value.trim();
  const roll=document.getElementById('froll').value.trim();
  const reg=document.getElementById('freg').value.trim();
  const email=document.getElementById('femail').value.trim();
  if(!name||!roll||!reg){ showToast('Name, Roll No and Reg No are required','err'); return; }
  if(!capturedImage){ showToast('Please capture a photo first','err'); return; }

  const btn=document.getElementById('regBtn');
  btn.disabled=true; btn.textContent='⏳ Registering...';

  try{
    const res=await fetch('/api/register',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name,roll_no:roll,reg_no:reg,email,image:capturedImage})
    });
    const d=await res.json();
    const msg=document.getElementById('statusMsg');
    if(d.success){
      msg.className='status-msg ok'; msg.textContent=d.message;
      document.getElementById('fname').value='';
      document.getElementById('froll').value='';
      document.getElementById('freg').value='';
      document.getElementById('femail').value='';
      capturedImage=null;
      document.getElementById('prevImg').style.display='none';
      document.getElementById('prevPh').style.display='block';
      btn.disabled=true;
      loadUsers(); showToast(d.message,'ok');
    }else{
      msg.className='status-msg err'; msg.textContent=d.message;
      showToast(d.message,'err');
    }
  }catch(e){ showToast('Server error','err'); }
  btn.disabled=false; btn.textContent='✅ Register Student';
}

async function loadUsers(){
  try{
    const res=await fetch('/api/users');
    const d=await res.json();
    document.getElementById('userCount').textContent=d.count||0;
    const tb=document.getElementById('userTbody');
    if(d.users?.length){
      tb.innerHTML=d.users.map(u=>`
        <tr>
          <td><span class="av">${u.name.charAt(0).toUpperCase()}</span>${u.name}</td>
          <td style="font-family:var(--mono);font-size:.75rem;">${u.roll_no}</td>
          <td style="font-family:var(--mono);font-size:.75rem;">${u.reg_no}</td>
          <td><button class="del-btn" onclick="deleteUser('${u.roll_no}','${u.name}')">✕</button></td>
        </tr>`).join('');
    }else{
      tb.innerHTML='<tr><td colspan="4"><div class="empty-state">No students registered</div></td></tr>';
    }
  }catch(e){}
}

async function deleteUser(roll,name){
  if(!confirm(`Remove "${name}" (${roll}) from the system?`)) return;
  try{
    const res=await fetch('/api/delete_user',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({roll_no:roll})
    });
    const d=await res.json();
    if(d.success){ loadUsers(); showToast(`${name} removed`,'ok'); }
    else showToast(d.message,'err');
  }catch(e){}
}

function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  setTimeout(()=>t.className='toast',3200);
}

loadUsers();
</script>
</body>
</html>
